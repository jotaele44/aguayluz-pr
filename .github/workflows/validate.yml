name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Federation manifest gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("federation.json").read_text())
          required = {
              "schema_version",
              "program_id",
              "repository_full_name",
              "federation_role",
              "hub_parent",
              "hub_callable_commands",
              "canonical_outputs",
              "federation_readiness_gate",
          }
          missing = sorted(required - set(manifest))
          assert not missing, f"federation.json missing required keys: {missing}"
          assert manifest["schema_version"] == "repo_federation_manifest_v1"
          assert manifest["program_id"] == "aguayluz-pr"
          assert manifest["hub_parent"] == "thehub-pr"
          assert "setup" in manifest["hub_callable_commands"]
          assert "test_suite" in manifest["hub_callable_commands"]
          gate = manifest["federation_readiness_gate"]
          assert isinstance(gate.get("ready_for_hub_discovery"), bool)
          assert isinstance(gate.get("ready_for_hub_live_execution"), bool)
          assert isinstance(gate.get("blocking_conditions"), list)
          print("federation manifest gate passed")
          PY
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Validation gates
        run: python scripts/validate_repo.py

  geo-import-check:
    # build_pr_geo_boundaries.py imports geopandas, which is not in the default
    # install. Install the `geo` extra and import-check the script (its --help
    # loads geopandas at module level, then exits 0 without needing the Census
    # shapefiles) so a missing/broken geo dependency fails CI instead of only
    # surfacing when someone runs the script.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with geo extra
        run: python -m pip install -e .[geo]
      - name: Import-check geo boundary builder
        run: python scripts/build_pr_geo_boundaries.py --help

  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        run: npm ci
        working-directory: dashboard
      - name: Build
        run: npm run build
        working-directory: dashboard

  live-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - name: Live smoke
        env:
          EPA_WATERS_API_KEY: ${{ secrets.EPA_WATERS_API_KEY }}
        run: python scripts/smoke_test.py
