name: refresh

on:
  schedule:
    - cron: "0 7 * * *"    # daily 07:00 UTC — NWS alerts + USGS levels
    - cron: "0 7 * * 1"    # Monday 07:00 UTC — full weekly refresh
  workflow_dispatch:
    inputs:
      cadence:
        description: "Refresh cadence: daily | weekly | all"
        required: false
        default: "weekly"

permissions:
  contents: write   # allow the job to commit updated data files

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Daily refresh (NWS alerts + USGS levels)
        if: >
          github.event_name == 'schedule' &&
          github.event.schedule == '0 7 * * *'
        run: python scripts/refresh.py --daily

      - name: Weekly refresh (full corpus)
        if: >
          (github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.cadence == 'weekly')
        run: python scripts/refresh.py --weekly

      - name: Full refresh (includes optional MiLUMA)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.cadence == 'all'
        run: python scripts/refresh.py --all

      - name: Commit updated data
        run: |
          git config user.name  "aguayluz-bot"
          git config user.email "noreply@github.com"
          git add data/ outputs/ reports/
          git diff --cached --quiet \
            && echo "No data changes to commit." \
            || git commit -m "chore: scheduled refresh $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push
